<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Post</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <form action="recepcion.php" method="POST" target="_blank">
        <fieldset class="border p-4 m-4">
            <legend>Formulario Post</legend>
            <div class="container">
                <div class="row" id="row-nombre">
                    <div class="col">
                        <input type="text" name="nombre" class="form-control" placeholder="Nombre"
                            aria-label="First name" required>
                    </div>
                </div><br>

                <div class="row" id="row-apellido">
                    <div class="col">
                        <input type="text" name="apellido" class="form-control" placeholder="Apellido"
                            aria-label="Last name" required>
                    </div>
                </div><br>

                <div class="row" id="row-edad">
                    <div class="col">
                        <input type="number" name="edad" class="form-control" placeholder="Edad" aria-label="Age" required>
                    </div>
                </div>
                <br>
                <button type="submit" class="btn btn-primary">Enviar</button>

            </div>

        </fieldset>
    </form>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
