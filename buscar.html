<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar-GET</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body class="d-flex justify-content-center align-items-center ">
    <form action="resultados.php" method="get" target="_blank">
        <fieldset class="border p-4 m-4">
            <legend>Formulario GET</legend>
            <div class="container">
                <div class="row" id="row-busqueda">
                    <div class="col">
                        <label for="busqueda">¿Qué desea buscar?</label><br>
                        <input type="text" name="busqueda" required>
                    </div>
                </div><br>
                <label for="tipo">Tipo</label>
                <select name="tipo" class="form-control">
                    <option value="funcion">Función</option>
                    <option value="concepto">Concepto</option>
                </select><br>
                <button type="submit" class="btn btn-primary">Buscar</button>
            </div>
        </fieldset>
    </form>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
